{% extends 'layout_2.html' %}
{% block title %} Product List {% endblock title %}
{% block content %}
<table class="table">
  <tr style="background-color:#333; color:#fff">
      <td>ID</td>
      <td>Product Name</td>
      <td>Price</td>
      <td>Discount</td>
  </tr>
  {% for pro in p %}
    <tr>
      <td> {{ pro.id }}</td>
      <td> {{ pro.names }}</td>
      <td> {{ pro.price }}</td>
      <td> {{ pro.discount }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock content %}
